<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HLSA OKF Duty Tracker</title>

<style>
body { background: linear-gradient(135deg,#1a1a1a,#2a0000); color:white; font-family:Arial,sans-serif; padding:20px; }
h1 { text-align:center; color:#ff3b3b; }

input { padding:8px; margin:5px; border-radius:5px; border:none; }
button { padding:8px 12px; margin:5px; border-radius:5px; border:none; cursor:pointer; font-weight:bold; }

.addBtn { background:#ff3b3b; color:white; }
.exportBtn { background:#0099ff; color:white; }
.resetBtn { background:#555; color:white; }
.danger { background:#990000; color:white; }

.dashboard { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:15px; margin-top:20px; }
.box { background:#222; padding:15px; border-radius:10px; text-align:center; box-shadow:0 0 10px rgba(255,0,0,0.3); }

table { width:100%; border-collapse:collapse; margin-top:20px; }
th, td { padding:10px; border-bottom:1px solid #444; text-align:center; }

.progress-container { background:#333; border-radius:10px; width:100%; height:25px; margin-top:20px; }
.progress-bar { background:#ff3b3b; height:100%; width:0%; border-radius:10px; text-align:center; line-height:25px; }
</style>
</head>

<body>

<h1>🚒 OKF Duty & Bevétel Tracker</h1>

<div style="text-align:center;">
<button onclick="showTab('manual')" class="addBtn">📝 Kézi</button>
<button onclick="showTab('live')" class="exportBtn">⏱ Élő</button>
</div>

<!-- Kézi -->
<div id="manualTab">
<input type="time" id="start">
<input type="time" id="end">
<input type="number" id="wood" placeholder="Fa">
<button onclick="addShift()" class="addBtn">➕</button>
</div>

<!-- Élő -->
<div id="liveTab" style="display:none; text-align:center;">
<h2>⏱ Élő szolgálat</h2>
<p id="liveStatus">Nincs aktív</p>
<p id="liveTimer">00:00:00</p>

<input type="number" id="liveWood" placeholder="Fa">

<br><br>
<button onclick="startLive()" class="addBtn">Start</button>
<button onclick="stopLive()" class="danger">Stop</button>
</div>

<div class="dashboard">
<div class="box">Munka: <span id="totalWorked">0</span></div>
<div class="box">Fizetett: <span id="totalPaid">0</span></div>
<div class="box">Pénz: <span id="totalMoney">0</span></div>
</div>

<table>
<thead><tr><th>Kezdés</th><th>Vége</th><th>Óra</th><th>Pénz</th></tr></thead>
<tbody id="shiftTable"></tbody>
</table>

<div class="progress-container">
<div id="progressBar" class="progress-bar">0%</div>
</div>

<!-- MEETING -->
<h3>Következő meeting:</h3>
<div class="box"><span id="meetingCountdown"></span></div>

<script>
const HOURLY_WAGE=2000000;
const WOOD_PRICE=5000000;
const LAST_MEETING=new Date("2026-03-14T18:00:00");

let shifts=[];
let liveStartTime=null;
let liveInterval=null;

// TAB
function showTab(tab){
document.getElementById("manualTab").style.display=(tab==="manual")?"block":"none";
document.getElementById("liveTab").style.display=(tab==="live")?"block":"none";
}

// LIVE TIMER
function startLive(){
if(liveStartTime) return;

liveStartTime=new Date();
document.getElementById("liveStatus").innerText="Fut";

liveInterval=setInterval(()=>{
const diff=new Date()-liveStartTime;
const h=Math.floor(diff/3600000);
const m=Math.floor((diff%3600000)/60000);
const s=Math.floor((diff%60000)/1000);

document.getElementById("liveTimer").innerText=
`${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
},1000);
}

function stopLive(){
if(!liveStartTime) return;

clearInterval(liveInterval);

const end=new Date();
const hours=(end-liveStartTime)/3600000;

const money=Math.floor(hours)*HOURLY_WAGE;

shifts.push({
start:liveStartTime.toLocaleTimeString(),
end:end.toLocaleTimeString(),
hours,
money
});

liveStartTime=null;
render();
}

// MEETING
function getNextMeeting(){
let n=new Date(LAST_MEETING);
while(n<new Date()){ n.setDate(n.getDate()+14); }
return n;
}

setInterval(()=>{
const diff=getNextMeeting()-new Date();

const d=Math.floor(diff/86400000);
const h=Math.floor((diff%86400000)/3600000);
const m=Math.floor((diff%3600000)/60000);
const s=Math.floor((diff%60000)/1000);

document.getElementById("meetingCountdown").innerText=
`${d} nap ${h} óra ${m} perc ${s} mp`;
},1000);

// RENDER
function render(){
let w=0,p=0;

const table=document.getElementById("shiftTable");
table.innerHTML="";

shifts.forEach(s=>{
w+=s.hours;
p+=s.money;

table.innerHTML+=`<tr>
<td>${s.start}</td>
<td>${s.end}</td>
<td>${s.hours.toFixed(2)}</td>
<td>${s.money}</td>
</tr>`;
});

document.getElementById("totalWorked").innerText=w.toFixed(2);
document.getElementById("totalMoney").innerText=p;

const prog=Math.min((w/60)*100,100);
document.getElementById("progressBar").style.width=prog+"%";
document.getElementById("progressBar").innerText=prog.toFixed(1)+"%";
}
</script>

</body>
</html>
