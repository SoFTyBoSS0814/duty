<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HLSA OKF Duty Tracker</title>

<style>
body {
    background: linear-gradient(135deg, #1a1a1a, #2a0000);
    color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #ff3b3b;
}

input {
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 8px 12px;
    margin: 5px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.addBtn { background: #ff3b3b; color: white; }
.exportBtn { background: #0099ff; color: white; }
.resetBtn { background: #555; color: white; }
.danger { background: #990000; color: white; }

.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.box {
    background: #222;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 10px rgba(255,0,0,0.3);
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #444;
    text-align: center;
}
</style>
</head>
<body>

<h1>🚒 OKF Duty & Bevétel Tracker</h1>

<div>
    <label>Kezdés:</label>
    <input type="time" id="start">

    <label>Vége:</label>
    <input type="time" id="end">

    <label>Leadott fa (db):</label>
    <input type="number" id="wood" placeholder="0">

    <button class="addBtn" onclick="addShift()">➕ Hozzáadás</button>
    <button class="exportBtn" onclick="exportCSV()">📁 Export CSV</button>
    <button class="resetBtn" onclick="resetAll()">🗑 Reset</button>
</div>

<div class="dashboard">
    <div class="box">
        <h3>Teljes Ledolgozott Óra</h3>
        <span id="totalWorked">0.00 óra</span>
    </div>
    <div class="box">
        <h3>Teljes Fizetett Óra</h3>
        <span id="totalPaid">0 óra</span>
    </div>
    <div class="box">
        <h3>Teljes Bevétel</h3>
        <span id="totalMoney">0 Ft</span>
    </div>
</div>

<table>
<thead>
<tr>
<th>Kezdés</th>
<th>Vége</th>
<th>Ledolgozott</th>
<th>Fizetett</th>
<th>Fa</th>
<th>Bevétel</th>
<th>Törlés</th>
</tr>
</thead>
<tbody id="shiftTable"></tbody>
</table>

<script>

const HOURLY_WAGE = 1900000;
const WOOD_PRICE = 5000000;

let shifts = JSON.parse(localStorage.getItem("mta_final_shifts")) || [];

function saveData(){
    localStorage.setItem("mta_final_shifts", JSON.stringify(shifts));
}

function timeToMinutes(t){
    const [h,m] = t.split(":").map(Number);
    return h*60 + m;
}

function calcMinutes(start,end){
    let s = timeToMinutes(start);
    let e = timeToMinutes(end);
    if(e < s) e += 1440;
    return e - s;
}

function formatMoney(x){
    return x.toLocaleString("hu-HU") + " Ft";
}

function addShift(){
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;
    const wood = parseInt(document.getElementById("wood").value) || 0;

    if(!start || !end){
        alert("Tölts ki minden mezőt!");
        return;
    }

    const totalMinutes = calcMinutes(start,end);

    const workedHours = totalMinutes / 60; // tizedes
    const paidHours = Math.floor(totalMinutes / 60); // egész

    const money = (paidHours * HOURLY_WAGE) + (wood * WOOD_PRICE);

    shifts.push({
        start,
        end,
        workedHours,
        paidHours,
        wood,
        money
    });

    saveData();
    render();
}

function deleteShift(index){
    shifts.splice(index,1);
    saveData();
    render();
}

function resetAll(){
    if(confirm("Biztos törlöd az összes adatot?")){
        shifts = [];
        saveData();
        render();
    }
}

function render(){
    const table = document.getElementById("shiftTable");
    table.innerHTML = "";

    let totalWorked = 0;
    let totalPaid = 0;
    let totalMoney = 0;

    shifts.forEach((shift,index)=>{
        totalWorked += shift.workedHours;
        totalPaid += shift.paidHours;
        totalMoney += shift.money;

        table.innerHTML += `
        <tr>
            <td>${shift.start}</td>
            <td>${shift.end}</td>
            <td>${shift.workedHours.toFixed(2)} óra</td>
            <td>${shift.paidHours} óra</td>
            <td>${shift.wood}</td>
            <td>${formatMoney(shift.money)}</td>
            <td><button class="danger" onclick="deleteShift(${index})">❌</button></td>
        </tr>
        `;
    });

    document.getElementById("totalWorked").innerText = totalWorked.toFixed(2) + " óra";
    document.getElementById("totalPaid").innerText = totalPaid + " óra";
    document.getElementById("totalMoney").innerText = formatMoney(totalMoney);
}

function exportCSV(){
    let csv = "Kezdés,Vége,Ledolgozott,Fizetett,Fa,Bevétel\n";

    shifts.forEach(s=>{
        csv += `${s.start},${s.end},${s.workedHours.toFixed(2)},${s.paidHours},${s.wood},${s.money}\n`;
    });

    let blob = new Blob([csv],{type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "mta_bevetel.csv";
    a.click();
}

render();

</script>

</body>
</html>
